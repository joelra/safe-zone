plugins {
	id 'java'
	id 'xyz.jpenilla.run-paper' version '3.0.2'
}

dependencies {
	implementation project(':common')
	compileOnly 'io.papermc.paper:paper-api:1.21.11-R0.1-SNAPSHOT'
}

processResources {
	inputs.property 'version', project.version

	filesMatching('plugin.yml') {
		expand 'version': inputs.properties.version
	}
}

tasks.withType(JavaCompile).configureEach {
	options.release = 21
	options.compilerArgs += ['-Xlint:deprecation']
}

java {
	withSourcesJar()
	sourceCompatibility = JavaVersion.VERSION_21
	targetCompatibility = JavaVersion.VERSION_21
}

base {
	archivesName = "${rootProject.name}-paper"
}

tasks.named('runServer') {
	minecraftVersion(project.findProperty('minecraft_version').toString())
	runDirectory = rootProject.layout.projectDirectory.dir('run/paper')
	workingDir = rootProject.file('run/paper')
}

jar {
	from(project(':common').sourceSets.main.output)
	from(rootProject.file('LICENSE')) {
		rename { "${it}_${rootProject.name}-paper" }
	}
}
